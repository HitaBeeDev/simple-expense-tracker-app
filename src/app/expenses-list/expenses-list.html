<section class="grid grid-cols-9 p-7 w-full gap-5">
  <div class="col-span-3 w-full sticky top-7 self-start">
    <app-expenses-hero />

    <app-new-expense-card
      [(newExpenseTitle)]="newExpenseTitle"
      [(newExpenseAmount)]="newExpenseAmount"
      [(newExpenseDate)]="newExpenseDate"
      [(newExpenseCategory)]="newExpenseCategory"
      [selectedCurrency]="service.selectedCurrency()"
      (selectedCurrencyChange)="service.selectedCurrency.set($any($event))"
      [maxDate]="service.maxDate"
      [categories]="service.categories"
      [currencyOptions]="service.currencyOptions"
      [addExpenseErrors]="addExpenseErrors"
      (currencyPreferenceChange)="service.saveCurrencyPreference()"
      (addExpenseClick)="addExpense()"
    />
  </div>

  <div class="col-span-6 h-full w-full">
    <app-expenses-overview
      [visibleCount]="service.filteredExpenses().length"
      [visibleTotal]="service.visibleTotal()"
      [selectedCurrency]="service.selectedCurrency()"
      [hasActiveFilters]="service.hasActiveFilters()"
      [searchQuery]="service.searchQuery()"
      (searchQueryChange)="service.searchQuery.set($event)"
      [selectedCategoryFilter]="service.selectedCategoryFilter()"
      (selectedCategoryFilterChange)="service.selectedCategoryFilter.set($any($event))"
      [selectedDateRange]="service.selectedDateRange()"
      (selectedDateRangeChange)="service.selectedDateRange.set($any($event))"
      [selectedSort]="service.selectedSort()"
      (selectedSortChange)="service.selectedSort.set($any($event))"
      [customStartDate]="service.customStartDate()"
      (customStartDateChange)="service.customStartDate.set($event)"
      [customEndDate]="service.customEndDate()"
      (customEndDateChange)="service.customEndDate.set($event)"
      [maxDate]="service.maxDate"
      [allCategoriesValue]="service.allCategoriesValue"
      [categories]="service.categories"
      [dateRangeOptions]="service.dateRangeOptions"
      [sortOptions]="service.sortOptions"
      (exportCsvClick)="service.exportCsv()"
      (resetClick)="service.clearFilters()"
    />

    <app-visible-total-card
      [visibleTotal]="service.visibleTotal()"
      [selectedCurrency]="service.selectedCurrency()"
      [visibleCount]="service.filteredExpenses().length"
      [highestExpense]="service.highestExpense()"
      [highestExpenseCategoryIcon]="service.highestExpenseCategoryIcon()"
    />

    <app-expense-summaries-card
      [monthlyBreakdown]="service.monthlyBreakdown()"
      [categoryTotals]="service.categoryTotals()"
      [selectedCurrency]="service.selectedCurrency()"
      [categoryIcons]="service.categoryIcons"
    />

    <app-expenses-activity-card
      [filteredExpenses]="service.filteredExpenses()"
      [selectedCurrency]="service.selectedCurrency()"
      [editingExpenseId]="editingExpenseId"
      [(editExpenseTitle)]="editExpenseTitle"
      [(editExpenseAmount)]="editExpenseAmount"
      [(editExpenseDate)]="editExpenseDate"
      [(editExpenseCategory)]="editExpenseCategory"
      [editExpenseErrors]="editExpenseErrors"
      [categories]="service.categories"
      [maxDate]="service.maxDate"
      (startEditClick)="startEdit($event)"
      (saveEditClick)="saveEdit($event)"
      (cancelEditClick)="cancelEdit()"
      (deleteExpenseClick)="deleteExpense($event)"
    />
  </div>
</section>
