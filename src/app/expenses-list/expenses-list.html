<section class="grid grid-cols-9 p-7 w-full gap-5">
  <div class="col-span-3 w-full sticky top-7 self-start">
    <app-expenses-hero />

    <app-new-expense-card
      [(newExpenseTitle)]="newExpenseTitle"
      [(newExpenseAmount)]="newExpenseAmount"
      [(newExpenseDate)]="newExpenseDate"
      [(newExpenseCategory)]="newExpenseCategory"
      [(selectedCurrency)]="selectedCurrency"
      [maxDate]="maxDate"
      [categories]="categories"
      [currencyOptions]="currencyOptions"
      [addExpenseErrors]="addExpenseErrors"
      (currencyPreferenceChange)="saveCurrencyPreference()"
      (addExpenseClick)="addExpense()"
    />
  </div>

  <div class="col-span-6 h-full w-full">
    <app-expenses-overview
      [visibleCount]="filteredExpenses.length"
      [visibleTotal]="visibleTotal"
      [selectedCurrency]="selectedCurrency"
      [hasActiveFilters]="hasActiveFilters"
      [(searchQuery)]="searchQuery"
      [(selectedCategoryFilter)]="selectedCategoryFilter"
      [(selectedDateRange)]="selectedDateRange"
      [(selectedSort)]="selectedSort"
      [(customStartDate)]="customStartDate"
      [(customEndDate)]="customEndDate"
      [maxDate]="maxDate"
      [allCategoriesValue]="allCategoriesValue"
      [categories]="categories"
      [dateRangeOptions]="dateRangeOptions"
      [sortOptions]="sortOptions"
      (exportCsvClick)="exportVisibleExpensesToCsv()"
      (resetClick)="clearFilters()"
    />

    <app-visible-total-card
      [visibleTotal]="visibleTotal"
      [selectedCurrency]="selectedCurrency"
      [visibleCount]="filteredExpenses.length"
      [highestExpense]="highestExpense"
      [highestExpenseCategoryIcon]="
        highestExpense ? getCategoryDetails(highestExpense.category).icon : ''
      "
    />

    <app-expense-summaries-card
      [monthlyBreakdown]="monthlyBreakdown"
      [categoryTotals]="categoryTotals"
      [selectedCurrency]="selectedCurrency"
      [categoryIcons]="categoryIcons"
    />

    <app-expenses-activity-card
      [filteredExpenses]="filteredExpenses"
      [selectedCurrency]="selectedCurrency"
      [editingExpenseId]="editingExpenseId"
      [(editExpenseTitle)]="editExpenseTitle"
      [(editExpenseAmount)]="editExpenseAmount"
      [(editExpenseDate)]="editExpenseDate"
      [(editExpenseCategory)]="editExpenseCategory"
      [editExpenseErrors]="editExpenseErrors"
      [categories]="categories"
      [maxDate]="maxDate"
      (startEditClick)="startEdit($event)"
      (saveEditClick)="saveEdit($event)"
      (cancelEditClick)="cancelEdit()"
      (deleteExpenseClick)="deleteExpense($event)"
    />
  </div>
</section>
