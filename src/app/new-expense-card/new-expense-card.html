<div class="bg-[#2d3c4d] p-[1.7rem] rounded-[1rem] mt-5">
  <div class="flex flex-row items-center justify-between">
    <p class="text-[0.8rem] font-[500] text-[#eaeef4]">New Expense</p>

    <p class="text-[0.8rem] font-[500] text-[#eaeef4]">Add a record</p>
  </div>

  <div class="mt-4">
    <div>
      <label for="expense-title" class="text-[0.75rem] font-[400] text-[#eaeef4]">Expense Title</label>

      <input
        id="expense-title"
        [ngModel]="newExpenseTitle"
        (ngModelChange)="newExpenseTitleChange.emit($event)"
        type="text"
        placeholder="e.g. Grocery shopping, gym membership..."
        class="mt-1 h-[2.5rem] text-[0.75rem] w-full rounded-[0.5rem] bg-[#f5f7fa] text-[#243865] outline-none transition-[border-color,box-shadow,transform] duration-150 placeholder:text-[#8b98b6] focus:border-[rgba(58,84,145,0.42)] focus:shadow-[0_0_0_4px_rgba(58,84,145,0.14)] focus-visible:ring-2 focus-visible:ring-[#789bb8]"
      />
    </div>

    <div class="mt-4 grid grid-cols-2 items-center justify-center gap-3">
      <div class="col-span-1">
        <label for="expense-amount" class="text-[0.75rem] font-[400] text-[#eaeef4]">Expense Amount</label>

        <input
          id="expense-amount"
          [ngModel]="newExpenseAmount"
          (ngModelChange)="newExpenseAmountChange.emit($event)"
          type="number"
          min="0.01"
          step="0.01"
          placeholder="Add your expense amount here"
          class="mt-1 pl-2 pr-2 h-[2.5rem] text-[0.75rem] w-full rounded-[0.5rem] bg-[#f5f7fa] text-[#243865] outline-none transition-[border-color,box-shadow,transform] duration-150 placeholder:text-[#8b98b6] focus:border-[rgba(58,84,145,0.42)] focus:shadow-[0_0_0_4px_rgba(58,84,145,0.14)] focus-visible:ring-2 focus-visible:ring-[#789bb8]"
        />
      </div>

      <div class="col-span-1">
        <label for="expense-date" class="text-[0.75rem] font-[400] text-[#eaeef4]">Expense Date</label>

        <input
          id="expense-date"
          [ngModel]="newExpenseDate"
          (ngModelChange)="newExpenseDateChange.emit($event)"
          type="date"
          [max]="maxDate"
          class="mt-1 pl-2 pr-2 h-[2.5rem] text-[0.75rem] w-full rounded-[0.5rem] bg-[#f5f7fa] text-[#243865] outline-none transition-[border-color,box-shadow,transform] duration-150 placeholder:text-[#8b98b6] focus:border-[rgba(58,84,145,0.42)] focus:shadow-[0_0_0_4px_rgba(58,84,145,0.14)] focus-visible:ring-2 focus-visible:ring-[#789bb8]"
        />
      </div>
    </div>

    <div class="mt-4 grid grid-cols-2 items-center justify-center gap-3">
      <div class="col-span-1">
        <label for="expense-category" class="text-[0.75rem] font-[400] text-[#eaeef4]">Category</label>

        <select
          id="expense-category"
          [ngModel]="newExpenseCategory"
          (ngModelChange)="newExpenseCategoryChange.emit($event)"
          class="mt-1 pl-2 pr-2 h-[2.5rem] text-[0.75rem] w-full rounded-[0.5rem] bg-[#f5f7fa] text-[#243865] outline-none transition-[border-color,box-shadow,transform] duration-150 placeholder:text-[#8b98b6] focus:border-[rgba(58,84,145,0.42)] focus:shadow-[0_0_0_4px_rgba(58,84,145,0.14)] focus-visible:ring-2 focus-visible:ring-[#789bb8]"
        >
          <option *ngFor="let category of categories" [ngValue]="category.value">
            {{ category.icon }} {{ category.value }}
          </option>
        </select>
      </div>

      <div class="col-span-1">
        <label for="expense-currency" class="text-[0.75rem] font-[400] text-[#eaeef4]">Currency</label>

        <select
          id="expense-currency"
          [ngModel]="selectedCurrency"
          (ngModelChange)="onCurrencyChange($event)"
          class="mt-1 pl-2 pr-2 h-[2.5rem] w-full text-[0.75rem] rounded-[0.5rem] bg-[#f5f7fa] text-[#243865] outline-none transition-[border-color,box-shadow,transform] duration-150 placeholder:text-[#8b98b6] focus:border-[rgba(58,84,145,0.42)] focus:shadow-[0_0_0_4px_rgba(58,84,145,0.14)] focus-visible:ring-2 focus-visible:ring-[#789bb8]"
        >
          <option *ngFor="let option of currencyOptions" [ngValue]="option.value">
            {{ option.label }}
          </option>
        </select>
      </div>
    </div>
  </div>

  <div
    *ngIf="addExpenseErrors.length"
    role="alert"
    class="mt-4 rounded-[0.4rem] bg-[rgba(255,231,236,0.9)] p-1 text-[0.8rem] text-[#9f2746]"
  >
    <p *ngFor="let error of addExpenseErrors">{{ error }}</p>
  </div>

  <button
    type="button"
    (click)="addExpenseClick.emit()"
    class="mt-6 flex justify-center items-center w-full bg-[#789bb8] rounded-[0.5rem] h-[2.4rem] text-[0.76rem] font-[500] cursor-pointer text-[#f5f7fa] transition-all duration-300 hover:bg-[#577ea0] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-white focus-visible:ring-offset-2 focus-visible:ring-offset-[#789bb8]"
  >
    Add Expense
  </button>
</div>
